<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — Invest AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--surface:#111318;--border:rgba(255,255,255,.12);--text:#f0f2f7;--muted:#8a8fa8;--accent:#00e5a0;--red:#ff6b6b}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2rem;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:1.5rem}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#00e5a0,#4fa3f7);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px}
.logo h1{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800}
.logo p{font-size:.78rem;color:var(--muted)}
.field{margin-bottom:1rem}
.field label{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field input{width:100%;background:#181b22;border:1px solid var(--border);border-radius:9px;padding:12px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .15s;font-family:inherit}
.field input:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;background:var(--accent);color:#051a10;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;border:none;border-radius:10px;cursor:pointer;margin-top:.5rem;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.45;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:9px;font-size:.78rem;margin-bottom:1rem;display:none;line-height:1.5}
.msg.error{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);color:var(--red)}
.msg.success{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);color:var(--accent)}
.back{text-align:center;margin-top:1.2rem;font-size:.78rem;color:var(--muted)}
.back a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📈</div>
    <h1>Invest AI</h1>
    <p>Set your new password</p>
  </div>

  <div class="msg error" id="msg-error"></div>
  <div class="msg success" id="msg-success"></div>

  <div id="form-section">
    <div class="field">
      <label>New Password</label>
      <input type="password" id="new-password" placeholder="Min. 8 characters" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" />
    </div>
    <button class="btn" id="reset-btn" onclick="resetPassword()">Set New Password →</button>
  </div>

  <div class="back"><a href="index.html">← Back to Invest AI</a></div>
</div>

<script>
const RAILWAY_URL = 'https://invest-ai-production-f62b.up.railway.app/api';

function showError(msg) {
  const el = document.getElementById('msg-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('msg-success').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('msg-success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('msg-error').style.display = 'none';
}

async function resetPassword() {
  const password = document.getElementById('new-password').value;
  const confirm  = document.getElementById('confirm-password').value;

  if (!password) return showError('Please enter a new password.');
  if (password.length < 8) return showError('Password must be at least 8 characters.');
  if (password !== confirm) return showError('Passwords do not match.');

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    // Get the access token from URL hash (Supabase puts it there)
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', '?'));
    const accessToken = params.get('access_token');

    if (!accessToken) {
      return showError('Invalid or expired reset link. Please request a new one.');
    }

    // Use Supabase JS to update the password
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    const supabase = createClient(
      'https://pbhjyuafzkwswhktgblt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiaGp5dWFmemt3c3doa3RnYmx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Nzk4MDUsImV4cCI6MjA4OTM1NTgwNX0.0PI4bOQaj2HF5uHHpo3UWvXabb7HoyLPfsV1G9VSz1w'
    );

    // Set the session from the URL token
    await supabase.auth.setSession({
      access_token:  accessToken,
      refresh_token: params.get('refresh_token') || '',
    });

    const { error } = await supabase.auth.updateUser({ password });
    if (error) throw error;

    showSuccess('Password updated successfully! Redirecting to app…');
    document.getElementById('form-section').style.display = 'none';

    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);

  } catch(e) {
    showError(e.message || 'Could not update password. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Set New Password →';
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') resetPassword();
});
</script>
</body>
</html>
